# ******************************************************************************
# MLPerf LoadGen user config (Server scenario).
# Format: key = value. Key is 'model.scenario.key' or '*.*.key'. Use '*' for all.
# ******************************************************************************
# Query-count based run (no duration limit). Test runs until min_query_count is
# met and stops when max_query_count is reached (or when max_duration_ms would
# be exceeded; we set max_duration high so query count controls the run).
#
# *.Server.min_query_count  = minimum number of queries to complete
# *.Server.max_query_count  = maximum queries (0 = no limit)
# *.Server.target_qps      = target queries per second (issue rate)
#
# Durations are in milliseconds. Set min_duration=0 and max_duration high so
# that min_query_count / max_query_count define the run length.
#
# Server scenario: one query per sample.
# *.Server.samples_per_query = 1
#
# ******************************************************************************

# Server scenario: no concatenation/permutation of samples (one sample per query)
*.*.sample_concatenate_permutation = 0

*.Server.min_query_count = 32
*.Server.max_query_count = 32
*.Server.target_qps = 32
*.Server.min_duration = 0
*.Server.max_duration = 86400000
